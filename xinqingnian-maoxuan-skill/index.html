<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新青年.skill</title>
  <meta http-equiv="refresh" content="0; url=./examples/%E7%BB%84%E7%BB%87%E5%88%86%E5%8F%89%E6%A1%88%E4%BE%8B%E6%8A%A5%E5%91%8A.html" />
  <script>
    window.location.replace("./examples/%E7%BB%84%E7%BB%87%E5%88%86%E5%8F%89%E6%A1%88%E4%BE%8B%E6%8A%A5%E5%91%8A.html");
  </script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f1e7;
      --fg: #2f1a16;
      --muted: #6b4a3f;
      --accent: #9f1711;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(201, 151, 69, 0.18), transparent 28%),
        linear-gradient(180deg, #f8f0e1 0%, #efe0c3 100%);
      color: var(--fg);
      font: 16px/1.6 "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
    }

    main {
      max-width: 720px;
      padding: 28px 32px;
      border: 1px solid rgba(122, 10, 7, 0.12);
      border-radius: 16px;
      background: rgba(255, 251, 245, 0.92);
      box-shadow: 0 16px 40px rgba(53, 22, 16, 0.12);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 30px;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    a {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <h1>正在进入示例报告</h1>
    <p>如果没有自动跳转，请点击 <a href="./examples/%E7%BB%84%E7%BB%87%E5%88%86%E5%8F%89%E6%A1%88%E4%BE%8B%E6%8A%A5%E5%91%8A.html">这里</a>。</p>
  </main>
</body>
</html>
